<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FBEAD2">
<meta name="description" content="Tapas y más Alicante — Tapas a 1,60€, bebidas y más. Carta digital.">
<title>Tapas y más · Alicante</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700;800&family=Lato:wght@300;400;700&family=Caveat:wght@600;700&family=Yeseva+One&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#FBEAD2; --cream-2:#FFF5E5; --paper:#FFFBF4;
  --terra:#C0392B; --terra-d:#992c20;
  --navy:#23265b; --ink:#2c2520; --muted:#7a6f63;
  --oliva:#3E7C4F; --azafran:#E8A93C;
  --flag-r:#AA151B; --flag-y:#F1BF00;
  --line:rgba(44,37,32,.12);
  --shadow:0 10px 30px rgba(44,37,32,.10);
  --r:16px; --max:1100px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Lato',system-ui,sans-serif;background:var(--cream);color:var(--ink);line-height:1.6;overflow-x:hidden;padding-bottom:120px;-webkit-font-smoothing:antialiased}
.wrap{max-width:var(--max);margin:0 auto;padding:0 18px}
h1,h2,h3,h4{font-family:'Playfair Display',serif;line-height:1.15}
img{max-width:100%;display:block}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* HEADER + ruban espagnol en fond */
.topbar{position:relative;background:var(--cream);border-bottom:1px solid var(--line);overflow:hidden}
.az-corner{position:absolute;width:80px;height:80px;opacity:.85;pointer-events:none;z-index:1}
.az-corner.tl{top:-6px;left:-6px}
.az-corner.tr{top:-6px;right:-6px;transform:scaleX(-1)}
.topbar-in{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;text-align:center;padding:16px 18px 20px;gap:7px}
.lang{display:flex;gap:16px;margin-bottom:4px}
.langbtn{display:flex;flex-direction:column;align-items:center;gap:3px;opacity:.55;transition:opacity .25s ease;padding:0}
.flagc{width:34px;height:34px;border-radius:50%;overflow:hidden;border:2px solid rgba(44,37,32,.25);box-shadow:0 1px 5px rgba(0,0,0,.2);transition:all .25s ease}
.flagc svg{width:100%;height:100%;display:block}
.langlbl{font-size:.66rem;font-weight:800;letter-spacing:.1em;color:var(--ink);text-shadow:0 1px 2px rgba(255,255,255,.75)}
.langbtn.on{opacity:1}
.langbtn.on .flagc{border-color:var(--terra);transform:scale(1.1)}
.langbtn.on .langlbl{color:var(--terra-d)}
.brand-logo{height:120px;width:auto;object-fit:contain}
.logo-row{display:flex;align-items:center;justify-content:center;gap:14px}
.wing{width:96px;height:auto;flex:0 0 auto;pointer-events:none;filter:drop-shadow(0 1px 3px rgba(0,0,0,.12))}
.wing.right{transform:scaleX(-1)}
@media(max-width:480px){.wing{width:58px}.logo-row{gap:8px}}
.brand-name{font-family:'Yeseva One',serif;font-size:clamp(2rem,7vw,3rem);color:var(--terra);letter-spacing:.5px;line-height:1;text-shadow:0 1px 3px rgba(255,245,229,.6)}
.brand-name .y{color:#FFAA00}
.brand-sub{font-family:'Caveat',cursive;font-size:clamp(1.2rem,4vw,1.7rem);color:var(--navy);margin-top:-2px}
.brand-tag{font-size:.74rem;letter-spacing:.32em;text-transform:uppercase;color:var(--muted);font-weight:700}
.flag-line{height:5px;width:100%;background:linear-gradient(var(--flag-r) 0 28%,var(--flag-y) 28% 72%,var(--flag-r) 72% 100%)}

/* RUBAN azulejo */
.ruban{height:44px;width:100%;overflow:hidden;background:var(--cream-2);border-bottom:1px solid var(--line)}
.ruban-track{display:flex;width:max-content;animation:drift 28s linear infinite}
.tile{flex:0 0 44px;width:44px;height:44px}
@keyframes drift{from{transform:translateX(0)}to{transform:translateX(-440px)}}

/* NAV */
nav{position:sticky;top:0;z-index:60;background:rgba(251,234,210,.96);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);box-shadow:0 4px 18px rgba(44,37,32,.06)}
.nav-in{display:flex;align-items:center;max-width:var(--max);margin:0 auto;position:relative}
.nav-row{display:flex;gap:8px;overflow-x:auto;padding:11px 14px;scrollbar-width:none;flex:1 1 auto;scroll-behavior:smooth}
.nav-row::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;padding:9px 16px;border-radius:999px;font-size:14px;font-weight:700;color:var(--ink);background:var(--paper);border:1.5px solid var(--line);transition:all .25s ease;white-space:nowrap}
.tab:hover{border-color:var(--terra)}
.tab.on{background:var(--terra);color:#fff;border-color:var(--terra);box-shadow:0 4px 14px rgba(192,57,43,.3)}
@media(min-width:900px){.nav-row{justify-content:center}}
.nav-arrow{display:none}
@media(max-width:899px){
 .nav-arrow{display:flex;align-items:center;justify-content:center;position:absolute;top:0;bottom:0;width:42px;z-index:2;font-size:1.7rem;font-weight:700;color:var(--terra);opacity:.92;transition:opacity .45s ease}
 .nav-arrow.left{left:0;background:linear-gradient(90deg,var(--cream) 55%,transparent)}
 .nav-arrow.right{right:0;background:linear-gradient(270deg,var(--cream) 55%,transparent)}
 .nav-arrow.idle{opacity:.18}
}

/* MODE BAR */
.modebar{display:flex;justify-content:center;padding:18px 14px 4px}
.modeseg{display:flex;background:var(--paper);border:1.5px solid var(--line);border-radius:999px;padding:4px;gap:4px;box-shadow:var(--shadow)}
.modebtn{display:flex;align-items:center;gap:7px;padding:9px 18px;border-radius:999px;font-weight:700;font-size:.92rem;color:var(--muted);transition:all .25s ease}
.modebtn svg{width:17px;height:17px;fill:currentColor}
.modebtn.on{background:var(--terra);color:#fff;box-shadow:0 4px 12px rgba(192,57,43,.3)}

/* SECTIONS */
.cat{display:none}
.cat.on{display:block;animation:fade .5s ease}
@keyframes fade{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.banner{position:relative;height:230px;border-radius:0 0 var(--r) var(--r);overflow:hidden;background:var(--navy) center/cover no-repeat;margin-bottom:6px}
.banner.noimg{background:linear-gradient(135deg,var(--cream-2),#f3dcbd)}
.banner-ov{position:absolute;inset:0;background:linear-gradient(180deg,rgba(35,38,91,.05) 0%,rgba(44,37,32,.62) 100%)}
.banner-head{position:absolute;left:0;right:0;bottom:0;padding:22px;display:flex;align-items:center}
.banner-head h2{color:#fff;font-size:clamp(1.6rem,5vw,2.3rem);font-weight:700;text-shadow:0 2px 10px rgba(0,0,0,.4)}
.banner.noimg .banner-head h2{color:var(--terra);text-shadow:none}
.note{display:flex;flex-direction:column;align-items:center;text-align:center;gap:5px;background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:14px 18px;margin:16px auto;max-width:660px}
.note-main{font-family:'Playfair Display',serif;font-weight:800;color:var(--terra);font-size:clamp(1.05rem,4.4vw,1.35rem);white-space:nowrap;display:flex;align-items:center;gap:8px}
.note-main::before,.note-main::after{content:"";width:16px;height:2px;background:var(--azafran)}
.note-sub{color:var(--muted);font-size:.92rem;line-height:1.4}
.group-block{text-align:center;margin:30px 0 6px}
.group-title{font-size:1.2rem;font-weight:700;color:var(--navy);margin-top:8px}
.mini-ruban{display:block;width:100%;height:22px;opacity:.92;margin:12px 0}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin:14px 0}
.card{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);padding:16px 16px 14px;transition:transform .25s ease,box-shadow .25s ease,border-color .25s ease;opacity:0;transform:translateY(16px)}
.card.in{opacity:1;transform:none}
.card:hover{transform:translateY(-4px);box-shadow:var(--shadow);border-color:rgba(192,57,43,.35)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.card-top h4{font-size:1.12rem;font-weight:600;color:var(--ink)}
.card.view{padding:18px 18px 16px}
.card.view .card-top h4{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:600;color:var(--navy)}
.price{flex:0 0 auto;font-family:'Playfair Display',serif;font-weight:700;font-size:1.02rem;color:#fff;background:var(--terra);padding:4px 12px;border-radius:999px;white-space:nowrap}
.desc{font-size:.9rem;color:var(--muted);margin-top:6px}
.card-actions{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:14px}
.stepper{display:flex;align-items:center;background:var(--cream-2);border:1.5px solid var(--line);border-radius:999px;overflow:hidden}
.step{width:38px;height:38px;font-size:1.25rem;font-weight:700;color:var(--terra);transition:background .2s}
.step:hover{background:rgba(192,57,43,.12)}
.qty{min-width:30px;text-align:center;font-weight:700}
.add{display:flex;align-items:center;gap:7px;padding:9px 18px;border-radius:999px;background:var(--oliva);color:#fff;font-weight:700;font-size:.92rem;transition:transform .2s,box-shadow .2s,background .2s}
.add:hover{background:#34693f;transform:scale(1.04);box-shadow:0 6px 16px rgba(62,124,79,.35)}
.add svg{width:16px;height:16px;fill:currentColor}
/* DECO STRIPS */
.deco-strip{position:relative;width:100%;height:200px;border-radius:var(--r);overflow:hidden;cursor:zoom-in;border:2px solid var(--paper);box-shadow:0 6px 18px rgba(44,37,32,.12);opacity:0;transform:translateY(16px);margin:18px 0}
.deco-strip.in{opacity:1;transform:none}
.deco-strip img{width:100%;height:100%;object-fit:cover;transition:transform .5s ease}
.deco-strip:hover img{transform:scale(1.04)}
.deco-zoom{position:absolute;bottom:10px;right:10px;width:30px;height:30px;border-radius:50%;background:rgba(35,38,91,.7);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.9rem;backdrop-filter:blur(2px)}
@media(max-width:560px){.deco-strip{height:150px}}
/* LIGHTBOX */
.lightbox{position:fixed;inset:0;z-index:200;background:rgba(20,18,30,.92);display:none;align-items:center;justify-content:center;padding:20px}
.lightbox.on{display:flex;animation:fade .25s ease}
.lightbox img{max-width:92vw;max-height:88vh;object-fit:contain;border-radius:8px;cursor:zoom-in;transition:transform .3s ease}
.lightbox img.zoomed{transform:scale(2);cursor:zoom-out}
.lb-close{position:absolute;top:16px;right:18px;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.15);color:#fff;font-size:1.6rem;display:flex;align-items:center;justify-content:center}
/* CONTACT */
.contact{background:var(--navy);color:#fff;border-radius:var(--r);padding:30px 22px;margin:34px 0}
.contact h3{text-align:center;color:#fff;font-size:1.5rem;margin-bottom:20px}
.contact-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px}
.ci{display:flex;gap:12px;align-items:flex-start;color:#fff;text-decoration:none;background:rgba(255,255,255,.07);padding:14px 16px;border-radius:12px;transition:background .25s,transform .25s}
.ci:hover{background:rgba(255,255,255,.14);transform:translateY(-3px)}
.ci svg{width:24px;height:24px;fill:var(--azafran);flex:0 0 auto;margin-top:2px}
.ci .ci-t{font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;color:var(--azafran);font-weight:700}
.ci .ci-v{font-size:.98rem}
.review-wrap{text-align:center;margin:26px 0 8px}
.review{display:inline-flex;align-items:center;gap:12px;background:#fff;color:#3c4043;padding:15px 28px;border-radius:999px;font-weight:700;font-size:1.02rem;box-shadow:var(--shadow);border:2px solid transparent;transition:transform .25s,border-color .25s,box-shadow .25s;text-decoration:none}
.review:hover{transform:translateY(-3px);border-color:var(--oliva);box-shadow:0 12px 28px rgba(44,37,32,.18)}
.review .g{font-weight:800;font-size:1.15rem;letter-spacing:-.5px}
.review .g b:nth-child(1){color:#4285F4}.review .g b:nth-child(2){color:#EA4335}.review .g b:nth-child(3){color:#FBBC05}.review .g b:nth-child(4){color:#4285F4}.review .g b:nth-child(5){color:#34A853}.review .g b:nth-child(6){color:#EA4335}
.stars{color:var(--azafran);letter-spacing:2px;font-size:1.1rem}
.social{display:flex;justify-content:center;gap:16px;margin:22px 0}
.social .si{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--paper);border:1.5px solid var(--line);transition:transform .25s,background .25s,border-color .25s;cursor:default}
.social .si:hover{transform:translateY(-4px) scale(1.05);background:var(--terra);border-color:var(--terra)}
.social .si:hover svg{fill:#fff}
.social svg{width:24px;height:24px;fill:var(--navy);transition:fill .25s}
footer{text-align:center;color:var(--muted);font-size:.88rem;padding:18px 0 6px}
footer .hl{color:var(--terra);font-weight:700;font-family:'Playfair Display',serif}
footer .sig{font-family:'Caveat',cursive;font-size:1.3rem;color:var(--navy)}
/* FAB + CART */
.fab{display:none;position:fixed;bottom:20px;right:20px;z-index:80;align-items:center;gap:10px;background:var(--terra);color:#fff;padding:13px 20px 13px 16px;border-radius:999px;box-shadow:0 8px 26px rgba(192,57,43,.42);transition:transform .25s}
body.mode-order .fab{display:flex}
.fab:hover{transform:scale(1.05)}
.fab.pulse{animation:pulse .4s ease}
@keyframes pulse{0%{transform:scale(1)}40%{transform:scale(1.16)}100%{transform:scale(1)}}
.fab svg{width:26px;height:26px;fill:#fff}
.fab .fab-count{position:absolute;top:-6px;left:-6px;background:var(--oliva);color:#fff;min-width:24px;height:24px;border-radius:999px;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;padding:0 6px;border:2px solid var(--cream)}
.fab .fab-total{font-weight:700;font-size:1.02rem;font-family:'Playfair Display',serif}
.totop{position:fixed;bottom:20px;left:20px;z-index:80;width:46px;height:46px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(35,38,91,.4);opacity:0;pointer-events:none;transform:translateY(10px);transition:opacity .3s ease,transform .3s ease,background .25s}
.totop svg{width:24px;height:24px;fill:#fff}
.totop:hover{background:var(--terra)}
.totop.show{opacity:.96;pointer-events:auto;transform:none}
.toTop{position:fixed;bottom:20px;left:20px;z-index:80;width:48px;height:48px;border-radius:50%;background:var(--navy);display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(35,38,91,.4);opacity:0;transform:translateY(12px) scale(.9);pointer-events:none;transition:opacity .3s,transform .3s}
.toTop.on{opacity:1;transform:none;pointer-events:auto}
.toTop:hover{background:#2e3170;transform:translateY(-2px)}
.toTop svg{width:24px;height:24px;fill:#fff}
.overlay{position:fixed;inset:0;z-index:90;background:rgba(35,38,91,.55);backdrop-filter:blur(3px);display:none;align-items:flex-end;justify-content:center}
.overlay.on{display:flex;animation:fade .25s ease}
@media(min-width:640px){.overlay{align-items:center}}
.sheet{background:var(--cream);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;border-radius:20px 20px 0 0;padding:22px}
@media(min-width:640px){.sheet{border-radius:20px}}
.sheet-head{display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid var(--line);padding-bottom:14px;margin-bottom:16px}
.sheet-head h3{color:var(--terra);font-size:1.5rem}
.x{width:38px;height:38px;border-radius:50%;font-size:1.5rem;color:var(--ink);display:flex;align-items:center;justify-content:center;background:var(--paper);transition:transform .25s,color .25s}
.x:hover{color:var(--terra);transform:rotate(90deg)}
.cart-bar{display:flex;justify-content:flex-end;margin-bottom:10px}
.clear-all{display:inline-flex;align-items:center;gap:6px;font-size:.85rem;font-weight:700;color:var(--terra-d);padding:6px 12px;border:1.5px solid var(--line);border-radius:999px;transition:all .25s}
.clear-all:hover{background:var(--terra);color:#fff;border-color:var(--terra)}
.clear-all svg{width:14px;height:14px;fill:currentColor}
.citem{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:10px}
.citem-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.citem-name{font-weight:700}
.citem-line{font-weight:700;font-family:'Playfair Display',serif;color:var(--terra)}
.citem-ctrl{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.rm{display:flex;align-items:center;gap:6px;color:var(--terra-d);font-size:.85rem;font-weight:700}
.rm svg{width:15px;height:15px;fill:currentColor}
.empty{text-align:center;padding:40px 10px;color:var(--muted)}
.empty svg{width:54px;height:54px;fill:var(--line);margin-bottom:12px}
.totbox{background:var(--terra);color:#fff;border-radius:14px;padding:16px 18px;display:flex;justify-content:space-between;align-items:center;margin:14px 0}
.totbox .tl{font-size:1rem;opacity:.9}
.totbox .tv{font-family:'Playfair Display',serif;font-weight:800;font-size:1.7rem}
.ordmeta{font-size:.82rem;color:var(--muted);text-align:center;margin-bottom:14px}
.acts{display:flex;flex-direction:column;gap:10px}
.btn{display:flex;align-items:center;justify-content:center;gap:9px;padding:15px;border-radius:12px;font-weight:700;font-size:1.02rem;transition:transform .2s,filter .2s}
.btn:hover{transform:translateY(-2px)}
.btn svg{width:20px;height:20px;fill:currentColor}
.btn-wa{background:#25D366;color:#fff}
.btn-cp{background:var(--paper);color:var(--ink);border:1.5px solid var(--oliva)}
.toast{position:fixed;left:50%;bottom:108px;z-index:120;transform:translateX(-50%) translateY(24px);background:var(--navy);color:#fff;padding:13px 24px;border-radius:999px;font-weight:700;opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;box-shadow:var(--shadow)}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}.card,.deco-strip{opacity:1;transform:none}}
:focus-visible{outline:3px solid var(--azafran);outline-offset:2px}
</style>

const T={
 add:{es:"Añadir",en:"Add",fr:"Ajouter"},added:{es:"Añadido ✓",en:"Added ✓",fr:"Ajouté ✓"},removed:{es:"Eliminado",en:"Removed",fr:"Retiré"},

 clearAll:{es:"Vaciar",en:"Clear all",fr:"Vider"},

 hours:{es:"Horario",en:"Opening hours",fr:"Horaires"},hoursVal:{es:"Lun, Mié–Dom: 9:30–00:00 · Mar: cerrado",en:"Mon, Wed–Sun: 9:30–00:00 · Tue: closed",fr:"Lun, Mer–Dim : 9h30–00h00 · Mar : fermé"},

};
const LOC={es:"es-ES",en:"en-GB",fr:"fr-FR"};

let LANG="es", MODE="view", currentCat=ORDER[0];
const t=k=>T[k][LANG];
const eur=p=>p.toFixed(2).replace(".",",")+"€";
const ADDSVG='<svg viewBox="0 0 24 24"><path d="M11 11V5h2v6h6v2h-6v6h-2v-6H5v-2z"/></svg>';

let cart=[]; const IDX={};
ORDER.forEach(k=>{const c=MENU[k];(c.items||[]).concat(...(c.groups||[]).map(g=>g.items)).forEach(it=>IDX[it.id]={...it,cat:k});});
let orderNo=genOrder();

function save(){try{localStorage.setItem("tym",JSON.stringify({cart,orderNo,LANG,MODE,ts:Date.now()}))}catch(e){}}
function load(){try{const r=JSON.parse(localStorage.getItem("tym"));if(r&&Date.now()-r.ts<3600000){cart=r.cart||[];orderNo=r.orderNo||orderNo;if(r.LANG)LANG=r.LANG;if(r.MODE)MODE=r.MODE;}}catch(e){}}

function cardHTML(it){
  const d=it.d?'<p class="desc">'+it.d[LANG]+'</p>':"";
  const ctrl=MODE==="order"?'<div class="card-actions"><div class="stepper" data-id="'+it.id+'"><button class="step minus">−</button><span class="qty">1</span><button class="step plus">+</button></div><button class="add" data-id="'+it.id+'">'+ADDSVG+t("add")+'</button></div>':"";
  return '<div class="card'+(MODE==="view"?" view":"")+'" data-rev><div class="card-top"><h4>'+it[LANG]+'</h4><span class="price">'+eur(it.p)+'</span></div>'+d+ctrl+'</div>';
}
const MINIRUBAN='<svg class="mini-ruban" aria-hidden="true"><rect width="100%" height="100%" fill="url(#mrPat)"/></svg>';
function decoStrip(url){return '<figure class="deco-strip" data-rev><img loading="lazy" src="'+url+'" alt="" data-zoom="'+url+'"><span class="deco-zoom">⛶</span></figure>';}
function gridOnly(items){return '<div class="grid">'+items.map(cardHTML).join("")+'</div>';}
function listHTML(c){
  const deco=c.deco?c.deco.slice():[];
  if(c.groups){
    let out="",di=0;
    c.groups.forEach((g,i)=>{
      out+='<div class="group-block">'+MINIRUBAN+'<h3 class="group-title">'+g.t[LANG]+'</h3></div>'+gridOnly(g.items);
      if(i<c.groups.length-1&&di<deco.length)out+=decoStrip(deco[di++]);
    });
    while(di<deco.length)out+=decoStrip(deco[di++]);
    return out;
  }
  return MINIRUBAN+gridOnly(c.items)+deco.map(decoStrip).join("");
}
function buildNav(){navRow.innerHTML=ORDER.map(k=>'<button class="tab'+(k===currentCat?" on":"")+'" data-target="'+k+'">'+MENU[k].nav[LANG]+'</button>').join("");}
function buildSections(){
  sections.innerHTML=ORDER.map(k=>{
    const c=MENU[k];
    const ban=c.banner?'<div class="banner" style="background-image:url(\''+c.banner+'\')"><div class="banner-ov"></div><div class="banner-head"><h2>'+c.title[LANG]+'</h2></div></div>':'<div class="banner noimg"><div class="banner-head"><h2>'+c.title[LANG]+'</h2></div></div>';
    const note=c.note?'<div class="note"><span class="note-main">'+c.note.main[LANG]+'</span><span class="note-sub">'+c.note.sub[LANG]+'</span></div>':"";
    return '<section class="cat'+(k===currentCat?" on":"")+'" id="sec-'+k+'">'+ban+note+listHTML(c)+'</section>';
  }).join("");
  observeCards();
}
function applyI18n(){document.querySelectorAll("[data-i18n]").forEach(e=>e.innerHTML=t(e.dataset.i18n));document.documentElement.lang=LANG;}
function render(){document.body.classList.toggle("mode-order",MODE==="order");buildNav();buildSections();applyI18n();updateFab();}

document.querySelectorAll(".langbtn").forEach(b=>b.onclick=()=>{LANG=b.dataset.lang;document.querySelectorAll(".langbtn").forEach(x=>x.classList.toggle("on",x===b));render();renderCart();save();});
document.querySelectorAll(".modebtn").forEach(b=>b.onclick=()=>{MODE=b.dataset.mode;document.querySelectorAll(".modebtn").forEach(x=>x.classList.toggle("on",x===b));render();save();});

navRow.addEventListener("click",e=>{const b=e.target.closest(".tab");if(b)showCat(b.dataset.target,true);});
const navPrev=document.getElementById("navPrev"),navNext=document.getElementById("navNext");
navPrev.onclick=()=>gotoCat(-1);navNext.onclick=()=>gotoCat(1);
function gotoCat(d){const i=ORDER.indexOf(currentCat);showCat(ORDER[(i+d+ORDER.length)%ORDER.length],true);pokeNav();}
function showCat(k,scroll){
  currentCat=k;
  document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("on",x.dataset.target===k));
  document.querySelectorAll(".cat").forEach(s=>s.classList.toggle("on",s.id==="sec-"+k));
  const tab=navRow.querySelector('.tab[data-target="'+k+'"]');
  if(tab)navRow.scrollTo({left:tab.offsetLeft-navRow.clientWidth/2+tab.clientWidth/2,behavior:"smooth"});
  if(scroll){
    requestAnimationFrame(()=>{
      const nav=document.querySelector("nav"),navH=nav.offsetHeight;
      const sec=document.getElementById("sec-"+k);
      const secTop=sec.getBoundingClientRect().top+window.scrollY;
      const ban=sec.querySelector(".banner"),banH=ban?ban.offsetHeight:0;
      const target=Math.max(0,secTop+Math.max(0,banH-70)-navH);
      window.scrollTo({top:target,behavior:"smooth"});
    });
  }
  observeCards();
}
let idleT;
function pokeNav(){[navPrev,navNext].forEach(a=>a.classList.remove("idle"));clearTimeout(idleT);idleT=setTimeout(()=>[navPrev,navNext].forEach(a=>a.classList.add("idle")),2500);}
navRow.addEventListener("scroll",pokeNav,{passive:true});
let tsx=0,tsy=0;
sections.addEventListener("touchstart",e=>{tsx=e.changedTouches[0].clientX;tsy=e.changedTouches[0].clientY;},{passive:true});
sections.addEventListener("touchend",e=>{const dx=e.changedTouches[0].clientX-tsx,dy=e.changedTouches[0].clientY-tsy;if(Math.abs(dx)>55&&Math.abs(dx)>Math.abs(dy)*1.4){gotoCat(dx<0?1:-1);}},{passive:true});

sections.addEventListener("click",e=>{
  const z=e.target.closest("[data-zoom]");if(z){openLB(z.getAttribute("data-zoom"));return;}
  const s=e.target.closest(".step");
  if(s){const box=s.closest(".stepper"),q=box.querySelector(".qty");q.textContent=Math.max(1,+q.textContent+(s.classList.contains("plus")?1:-1));return;}
  const a=e.target.closest(".add");
  if(a){const id=a.dataset.id,box=a.closest(".card").querySelector(".stepper"),q=+box.querySelector(".qty").textContent;addToCart(id,q);box.querySelector(".qty").textContent="1";pulse();toast(t("added"));}
});

const lightbox=document.getElementById("lightbox"),lbImg=document.getElementById("lbImg");
function openLB(src){lbImg.src=src;lbImg.classList.remove("zoomed");lightbox.classList.add("on");}
function closeLB(){lightbox.classList.remove("on");}

function addToCart(id,q){const ex=cart.find(c=>c.id===id);if(ex)ex.q+=q;else cart.push({id,q});updateFab();save();}
function toggleCart(){overlay.classList.toggle("on");if(overlay.classList.contains("on"))renderCart();}
function updateFab(){fabCount.textContent=cart.reduce((s,c)=>s+c.q,0);fabTotal.textContent=eur(cart.reduce((s,c)=>s+IDX[c.id].p*c.q,0));}
function renderCart(){
  if(!cart.length){cartItems.innerHTML='<div class="empty"><svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49a1 1 0 00-.87-1.48H5.21l-.94-2H1z"/></svg><div>'+t("emptyCart")+'</div></div>';
    cartTotal.textContent="0,00€";ordMeta.textContent="";updateFab();return;}
  let tot=0,html='<div class="cart-bar"><button class="clear-all" onclick="clearCart()"><svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>'+t("clearAll")+'</button></div>';
  cart.forEach(c=>{const it=IDX[c.id],line=it.p*c.q;tot+=line;
    html+='<div class="citem"><div class="citem-top"><span class="citem-name">'+it[LANG]+'</span><span class="citem-line">'+eur(line)+'</span></div><div class="citem-ctrl"><button class="rm" onclick="rmItem(\''+c.id+'\')"><svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>'+t("remove")+'</button><div class="stepper"><button class="step" onclick="chg(\''+c.id+'\',-1)">−</button><span class="qty">'+c.q+'</span><button class="step" onclick="chg(\''+c.id+'\',1)">+</button></div></div></div>';});
  cartItems.innerHTML=html;cartTotal.textContent=eur(tot);
  ordMeta.textContent=t("orderNo")+": "+orderNo+" · "+new Date().toLocaleDateString(LOC[LANG]);
  updateFab();
}
function rmItem(id){cart=cart.filter(c=>c.id!==id);toast(t("removed"));save();renderCart();}
function chg(id,d){const c=cart.find(x=>x.id===id);if(!c)return;c.q+=d;if(c.q<=0)cart=cart.filter(x=>x.id!==id);save();renderCart();}
function clearCart(){cart=[];save();renderCart();toast(t("cleared"));}

const LANGNAME={es:"Español",en:"Inglés 🇬🇧",fr:"Francés 🇫🇷"};
function buildMsg(){
  const es=LANG==="es";
  let m="*TAPAS Y MÁS · ALICANTE*\n";
  m+="Pedido: "+orderNo+"\n";
  m+=new Date().toLocaleDateString(LOC.es)+" "+new Date().toLocaleTimeString(LOC.es,{hour:"2-digit",minute:"2-digit"})+"\n";
  if(!es)m+="Idioma del cliente: "+LANGNAME[LANG]+"\n";
  m+="————————————\n";let tot=0;
  ORDER.forEach(k=>{const inCat=cart.filter(c=>IDX[c.id].cat===k);if(!inCat.length)return;m+="\n*"+MENU[k].title.es+"*\n";inCat.forEach(c=>{const it=IDX[c.id],line=it.p*c.q;tot+=line;const name=es?it.es:it.es+" ("+it[LANG]+")";m+="• "+name+" x"+c.q+" — "+eur(line)+"\n";});});
  m+="————————————\n*TOTAL: "+eur(tot)+"*\n————————————\n\n"+T.waFooter.es;
  return m;
}
function sendWA(){if(!cart.length){toast(t("emptyMsg"));return;}window.open("https://wa.me/"+WA+"?text="+encodeURIComponent(buildMsg()),"_blank");}
function copyOrder(){if(!cart.length){toast(t("emptyMsg"));return;}navigator.clipboard.writeText(buildMsg()).then(()=>toast(t("copied"))).catch(()=>toast("Error"));}

function genOrder(){const d=new Date();return "TM-"+(""+d.getFullYear()).slice(-2)+String(d.getMonth()+1).padStart(2,"0")+String(d.getDate()).padStart(2,"0")+"-"+Math.random().toString(36).slice(2,6).toUpperCase();}
function pulse(){fab.classList.add("pulse");setTimeout(()=>fab.classList.remove("pulse"),420);}
let toastT;function toast(m){const el=document.getElementById("toast");el.textContent=m;el.classList.add("on");clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove("on"),2200);}
let io;
function observeCards(){
  if(window.matchMedia("(prefers-reduced-motion: reduce)").matches){document.querySelectorAll("[data-rev]").forEach(c=>c.classList.add("in"));return;}
  if(io)io.disconnect();
  io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add("in");io.unobserve(e.target);}}),{threshold:.1});
  document.querySelectorAll(".cat.on [data-rev]").forEach(c=>io.observe(c));
}

load();
document.querySelectorAll(".langbtn").forEach(x=>x.classList.toggle("on",x.dataset.lang===LANG));
document.querySelectorAll(".modebtn").forEach(x=>x.classList.toggle("on",x.dataset.mode===MODE));

render();
pokeNav();
const toTop=document.getElementById("toTop");
window.addEventListener("scroll",()=>{toTop.classList.toggle("show",window.scrollY>420);},{passive:true});
toTop.onclick=()=>window.scrollTo({top:0,behavior:"smooth"});
