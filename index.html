<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Tapas y más · Alicante</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700;800&family=Lato:wght@300;400;700&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#FBEAD2; --cream-2:#FFF5E5; --paper:#FFFBF4;
  --terra:#C0392B; --terra-d:#992c20;
  --navy:#23265b; --ink:#2c2520; --muted:#7a6f63;
  --oliva:#3E7C4F; --azafran:#E8A93C;
  --tile-blue:#a5bae0; --tile-gold:#f6ce2b; --tile-orange:#e47f2a;
  --flag-r:#AA151B; --flag-y:#F1BF00;
  --line:rgba(44,37,32,.12);
  --shadow:0 10px 30px rgba(44,37,32,.10);
  --r:16px;
  --max:1100px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Lato',system-ui,sans-serif;background:var(--cream);color:var(--ink);line-height:1.6;overflow-x:hidden;padding-bottom:120px;-webkit-font-smoothing:antialiased}
.wrap{max-width:var(--max);margin:0 auto;padding:0 18px}
h1,h2,h3,h4{font-family:'Playfair Display',serif;line-height:1.15}
img{max-width:100%;display:block}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* ---------- HEADER ---------- */
.topbar{position:relative;background:var(--cream-2);border-bottom:1px solid var(--line);overflow:hidden}
.az-corner{position:absolute;width:78px;height:78px;opacity:.9;pointer-events:none}
.az-corner.tl{top:-6px;left:-6px}
.az-corner.tr{top:-6px;right:-6px;transform:scaleX(-1)}
.topbar-in{position:relative;display:flex;flex-direction:column;align-items:center;text-align:center;padding:26px 18px 22px;gap:6px}
.lang{position:absolute;top:16px;right:16px;display:flex;border:1.5px solid var(--terra);border-radius:999px;overflow:hidden;background:var(--paper)}
.lang button{padding:6px 14px;font-size:13px;font-weight:700;letter-spacing:.04em;color:var(--terra)}
.lang button.on{background:var(--terra);color:#fff}
.brand-logo{height:96px;width:auto;object-fit:contain;margin-bottom:2px}
.brand-name{font-weight:800;font-size:clamp(1.8rem,6vw,2.7rem);color:var(--terra);letter-spacing:.5px}
.brand-name .y{color:var(--oliva)}
.brand-sub{font-family:'Caveat',cursive;font-size:clamp(1.2rem,4vw,1.6rem);color:var(--navy)}
.brand-tag{font-size:.74rem;letter-spacing:.32em;text-transform:uppercase;color:var(--muted);font-weight:700}
.flag-line{height:5px;width:100%;background:linear-gradient(var(--flag-r) 0 28%,var(--flag-y) 28% 72%,var(--flag-r) 72% 100%)}

/* azulejo ruban */
.ruban{height:42px;width:100%;display:block}

/* ---------- NAV ---------- */
nav{position:sticky;top:0;z-index:60;background:rgba(251,234,210,.96);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);box-shadow:0 4px 18px rgba(44,37,32,.06)}
.nav-row{display:flex;gap:8px;overflow-x:auto;padding:11px 18px;scrollbar-width:none;max-width:var(--max);margin:0 auto}
.nav-row::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;padding:9px 16px;border-radius:999px;font-size:14px;font-weight:700;color:var(--ink);background:var(--paper);border:1.5px solid var(--line);transition:all .25s ease;white-space:nowrap}
.tab:hover{border-color:var(--terra)}
.tab.on{background:var(--terra);color:#fff;border-color:var(--terra);box-shadow:0 4px 14px rgba(192,57,43,.3)}

/* ---------- SECTIONS ---------- */
.cat{display:none}
.cat.on{display:block;animation:fade .5s ease}
@keyframes fade{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

.banner{position:relative;height:230px;border-radius:0 0 var(--r) var(--r);overflow:hidden;background:var(--navy) center/cover no-repeat;margin-bottom:6px}
.banner.noimg{background:linear-gradient(135deg,var(--cream-2),#f3dcbd)}
.banner-ov{position:absolute;inset:0;background:linear-gradient(180deg,rgba(35,38,91,.05) 0%,rgba(44,37,32,.62) 100%)}
.banner-head{position:absolute;left:0;right:0;bottom:0;padding:22px 22px;display:flex;align-items:center;gap:12px}
.banner.noimg .banner-head{color:var(--terra)}
.banner-head h2{color:#fff;font-size:clamp(1.6rem,5vw,2.3rem);font-weight:700;text-shadow:0 2px 10px rgba(0,0,0,.4)}
.banner.noimg .banner-head h2{color:var(--terra);text-shadow:none}
.flag-tag{flex:0 0 auto;width:34px;height:22px;border-radius:4px;background:linear-gradient(var(--flag-r) 0 28%,var(--flag-y) 28% 72%,var(--flag-r) 72% 100%);box-shadow:0 2px 8px rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.5)}

.note{display:flex;align-items:center;gap:10px;background:var(--paper);border:1px solid var(--line);border-left:4px solid var(--azafran);border-radius:0 var(--r) var(--r) 0;padding:12px 16px;margin:16px 0;font-size:.95rem;color:var(--muted)}
.note b{color:var(--terra)}

.group-title{font-size:1.15rem;font-weight:700;color:var(--navy);margin:26px 0 4px;display:flex;align-items:center;gap:10px}
.group-title::before{content:"";width:18px;height:2px;background:var(--azafran)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin:14px 0}

.card{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);padding:16px 16px 14px;transition:transform .25s ease,box-shadow .25s ease,border-color .25s ease;opacity:0;transform:translateY(16px)}
.card.in{opacity:1;transform:none}
.card:hover{transform:translateY(-4px);box-shadow:var(--shadow);border-color:rgba(192,57,43,.35)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.card-top h4{font-size:1.12rem;font-weight:600;color:var(--ink)}
.price{flex:0 0 auto;font-family:'Playfair Display',serif;font-weight:700;font-size:1.02rem;color:#fff;background:var(--terra);padding:4px 12px;border-radius:999px;white-space:nowrap}
.card.info .price{background:var(--oliva)}
.desc{font-size:.9rem;color:var(--muted);margin-top:6px}
.card-actions{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:14px}
.stepper{display:flex;align-items:center;background:var(--cream-2);border:1.5px solid var(--line);border-radius:999px;overflow:hidden}
.step{width:38px;height:38px;font-size:1.25rem;font-weight:700;color:var(--terra);transition:background .2s}
.step:hover{background:rgba(192,57,43,.12)}
.qty{min-width:30px;text-align:center;font-weight:700;font-size:1rem}
.add{display:flex;align-items:center;gap:7px;padding:9px 18px;border-radius:999px;background:var(--oliva);color:#fff;font-weight:700;font-size:.92rem;transition:transform .2s,box-shadow .2s,background .2s}
.add:hover{background:#34693f;transform:scale(1.04);box-shadow:0 6px 16px rgba(62,124,79,.35)}
.add svg{width:16px;height:16px;fill:currentColor}
.card.info{background:var(--cream-2)}

/* ---------- CONTACT ---------- */
.contact{background:var(--navy);color:#fff;border-radius:var(--r);padding:30px 22px;margin:34px 0}
.contact h3{text-align:center;color:#fff;font-size:1.5rem;margin-bottom:20px}
.contact-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px}
.ci{display:flex;gap:12px;align-items:flex-start;color:#fff;text-decoration:none;background:rgba(255,255,255,.07);padding:14px 16px;border-radius:12px;transition:background .25s,transform .25s}
.ci:hover{background:rgba(255,255,255,.14);transform:translateY(-3px)}
.ci svg{width:24px;height:24px;fill:var(--tile-gold);flex:0 0 auto;margin-top:2px}
.ci .ci-t{font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;color:var(--tile-gold);font-weight:700}
.ci .ci-v{font-size:.98rem}

/* review + social */
.review-wrap{text-align:center;margin:26px 0 8px}
.review{display:inline-flex;align-items:center;gap:12px;background:#fff;color:#3c4043;padding:15px 28px;border-radius:999px;font-weight:700;font-size:1.02rem;box-shadow:var(--shadow);border:2px solid transparent;transition:transform .25s,border-color .25s,box-shadow .25s;text-decoration:none}
.review:hover{transform:translateY(-3px);border-color:var(--oliva);box-shadow:0 12px 28px rgba(44,37,32,.18)}
.review .g{font-weight:800;font-size:1.15rem;letter-spacing:-.5px}
.review .g b:nth-child(1){color:#4285F4}.review .g b:nth-child(2){color:#EA4335}.review .g b:nth-child(3){color:#FBBC05}.review .g b:nth-child(4){color:#4285F4}.review .g b:nth-child(5){color:#34A853}.review .g b:nth-child(6){color:#EA4335}
.stars{color:var(--azafran);letter-spacing:2px;font-size:1.1rem}
.social{display:flex;justify-content:center;gap:16px;margin:22px 0}
.social a{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--paper);border:1.5px solid var(--line);transition:transform .25s,background .25s,border-color .25s}
.social a:hover{transform:translateY(-4px) scale(1.05);background:var(--terra);border-color:var(--terra)}
.social a:hover svg{fill:#fff}
.social svg{width:24px;height:24px;fill:var(--navy);transition:fill .25s}

footer{text-align:center;color:var(--muted);font-size:.88rem;padding:18px 0 6px}
footer .hl{color:var(--terra);font-weight:700;font-family:'Playfair Display',serif}
footer .sig{font-family:'Caveat',cursive;font-size:1.3rem;color:var(--navy)}

/* ---------- FLOATING CART ---------- */
.fab{position:fixed;bottom:20px;right:20px;z-index:80;display:flex;align-items:center;gap:10px;background:var(--terra);color:#fff;padding:13px 20px 13px 16px;border-radius:999px;box-shadow:0 8px 26px rgba(192,57,43,.42);transition:transform .25s}
.fab:hover{transform:scale(1.05)}
.fab.pulse{animation:pulse .4s ease}
@keyframes pulse{0%{transform:scale(1)}40%{transform:scale(1.16)}100%{transform:scale(1)}}
.fab svg{width:26px;height:26px;fill:#fff}
.fab .fab-count{position:absolute;top:-6px;left:-6px;background:var(--oliva);color:#fff;min-width:24px;height:24px;border-radius:999px;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;padding:0 6px;border:2px solid var(--cream)}
.fab .fab-total{font-weight:700;font-size:1.02rem;font-family:'Playfair Display',serif}

/* ---------- CART MODAL ---------- */
.overlay{position:fixed;inset:0;z-index:90;background:rgba(35,38,91,.55);backdrop-filter:blur(3px);display:none;align-items:flex-end;justify-content:center}
.overlay.on{display:flex;animation:fade .25s ease}
@media(min-width:640px){.overlay{align-items:center}}
.sheet{background:var(--cream);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;border-radius:20px 20px 0 0;padding:22px;box-shadow:0 -10px 40px rgba(0,0,0,.3)}
@media(min-width:640px){.sheet{border-radius:20px}}
.sheet-head{display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid var(--line);padding-bottom:14px;margin-bottom:16px}
.sheet-head h3{color:var(--terra);font-size:1.5rem}
.x{width:38px;height:38px;border-radius:50%;font-size:1.5rem;color:var(--ink);display:flex;align-items:center;justify-content:center;background:var(--paper);transition:transform .25s,color .25s}
.x:hover{color:var(--terra);transform:rotate(90deg)}
.citem{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:10px}
.citem-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.citem-name{font-weight:700}
.citem-line{font-weight:700;font-family:'Playfair Display',serif;color:var(--terra)}
.citem-ctrl{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.rm{display:flex;align-items:center;gap:6px;color:var(--terra-d);font-size:.85rem;font-weight:700}
.rm svg{width:15px;height:15px;fill:currentColor}
.empty{text-align:center;padding:40px 10px;color:var(--muted)}
.empty svg{width:54px;height:54px;fill:var(--line);margin-bottom:12px}
.totbox{background:var(--terra);color:#fff;border-radius:14px;padding:16px 18px;display:flex;justify-content:space-between;align-items:center;margin:14px 0}
.totbox .tl{font-size:1rem;opacity:.9}
.totbox .tv{font-family:'Playfair Display',serif;font-weight:800;font-size:1.7rem}
.ordmeta{font-size:.82rem;color:var(--muted);text-align:center;margin-bottom:14px}
.acts{display:flex;flex-direction:column;gap:10px}
.btn{display:flex;align-items:center;justify-content:center;gap:9px;padding:15px;border-radius:12px;font-weight:700;font-size:1.02rem;transition:transform .2s,filter .2s}
.btn:hover{transform:translateY(-2px)}
.btn svg{width:20px;height:20px;fill:currentColor}
.btn-wa{background:#25D366;color:#fff}
.btn-wa:hover{filter:brightness(1.06)}
.btn-cp{background:var(--paper);color:var(--ink);border:1.5px solid var(--oliva)}

/* ---------- TOAST ---------- */
.toast{position:fixed;left:50%;bottom:108px;z-index:120;transform:translateX(-50%) translateY(24px);background:var(--navy);color:#fff;padding:13px 24px;border-radius:999px;font-weight:700;opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;box-shadow:var(--shadow)}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}.card{opacity:1;transform:none}}
:focus-visible{outline:3px solid var(--azafran);outline-offset:2px}
</style>
</head>

   banner:"https://photos.fife.usercontent.google.com/pw/AP1GczP1eax8fVXqY8O5zvtOmiN2PEhuBGjD6rb_r3tc6hTGY1infTCA2w=w1632-h911-s-no-gm?authuser=0",
   groups:[
    {t:{es:"Cafés",en:"Coffee"},items:[
      {id:"cf1",es:"Café solo",en:"Espresso",p:1.3},

};

/* ============ I18N ============ */
const T={
 add:{es:"Añadir",en:"Add"},
 added:{es:"Añadido al carrito ✓",en:"Added to cart ✓"},
 removed:{es:"Producto eliminado",en:"Item removed"},
 yourOrder:{es:"Tu pedido",en:"Your order"},
 total:{es:"Total",en:"Total"},
 sendWA:{es:"Enviar pedido por WhatsApp",en:"Send order via WhatsApp"},
 copy:{es:"Copiar pedido",en:"Copy order"},
 copied:{es:"Pedido copiado ✓",en:"Order copied ✓"},
 emptyCart:{es:"Tu carrito está vacío",en:"Your cart is empty"},
 emptyMsg:{es:"El carrito está vacío",en:"Cart is empty"},
 review:{es:"Déjanos tu reseña en Google",en:"Leave us a Google review"},
 visit:{es:"Ven a vernos",en:"Come visit us"},
 address:{es:"Dirección",en:"Address"},
 phone:{es:"Teléfono",en:"Phone"},
 hours:{es:"Horario",en:"Opening hours"},
 hoursVal:{es:"Lun, Mié–Dom: 9:30–00:00 · Mar: cerrado",en:"Mon, Wed–Sun: 9:30–00:00 · Tue: closed"},
 footnote:{es:"Carta digital · Precios en euros, IVA incluido.",en:"Digital menu · Prices in euros, VAT included."},
 orderNo:{es:"Nº de pedido",en:"Order no."}
};
let LANG="es";
const t=k=>T[k][LANG];
const eur=p=>p.toFixed(2).replace(".",",")+"€";

/* ============ STATE ============ */
let cart=[]; const IDX={};
ORDER.forEach(k=>{const c=MENU[k];(c.items||[]).concat(...(c.groups||[]).map(g=>g.items)).forEach(it=>IDX[it.id]={...it,cat:k});});
let orderNo=genOrder();

/* ============ RENDER ============ */
function cardHTML(it){
  const d=it.d?`<p class="desc">${it.d[LANG]}</p>`:"";
  return `<div class="card" data-rev>
    <div class="card-top"><h4>${it[LANG]}</h4><span class="price">${eur(it.p)}</span></div>${d}
    <div class="card-actions">
      <div class="stepper" data-id="${it.id}">
        <button class="step minus" aria-label="-">−</button><span class="qty">1</span><button class="step plus" aria-label="+">+</button>
      </div>
      <button class="add" data-id="${it.id}"><svg viewBox="0 0 24 24"><path d="M11 11V5h2v6h6v2h-6v6h-2v-6H5v-2z"/></svg>${t("add")}</button>
    </div></div>`;
}
function listHTML(c){
  if(c.groups) return c.groups.map(g=>`<div class="group-title">${g.t[LANG]}</div><div class="grid">${g.items.map(cardHTML).join("")}</div>`).join("");
  return `<div class="grid">${c.items.map(cardHTML).join("")}</div>`;
}
function buildNav(){
  navRow.innerHTML=ORDER.map((k,i)=>`<button class="tab${i===0?" on":""}" data-target="${k}">${MENU[k].nav[LANG]}</button>`).join("");
}
function buildSections(){
  sections.innerHTML=ORDER.map((k,i)=>{
    const c=MENU[k];
    const ban=c.banner
      ? `<div class="banner" style="background-image:url('${c.banner}')"><div class="banner-ov"></div><div class="banner-head"><span class="flag-tag"></span><h2>${c.title[LANG]}</h2></div></div>`
      : `<div class="banner noimg"><div class="banner-head"><span class="flag-tag"></span><h2>${c.title[LANG]}</h2></div></div>`;
    const note=c.note?`<div class="note">${c.note[LANG]}</div>`:"";
    return `<section class="cat${i===0?" on":""}" id="sec-${k}">${ban}${note}${listHTML(c)}</section>`;
  }).join("");
  observeCards();
}
function render(){buildNav();buildSections();applyI18n();updateFab();}

function applyI18n(){document.querySelectorAll("[data-i18n]").forEach(e=>e.innerHTML=t(e.dataset.i18n));document.documentElement.lang=LANG;}

function setLang(l){LANG=l;es.classList.toggle("on",l==="es");en.classList.toggle("on",l==="en");
  const active=document.querySelector(".tab.on")?.dataset.target||ORDER[0];
  render();showCat(active,false);renderCart();}

/* ============ NAV / TABS ============ */
navRow.addEventListener("click",e=>{const b=e.target.closest(".tab");if(b)showCat(b.dataset.target,true);});
function showCat(k,scroll){
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("on",t.dataset.target===k));
  document.querySelectorAll(".cat").forEach(s=>s.classList.toggle("on",s.id==="sec-"+k));
  if(scroll){const y=document.querySelector("nav").getBoundingClientRect().bottom+window.scrollY;
    if(window.scrollY>y-70)window.scrollTo({top:y-66,behavior:"smooth"});}
  observeCards();
}

/* ============ STEPPERS + ADD ============ */
sections.addEventListener("click",e=>{
  const s=e.target.closest(".step");
  if(s){const box=s.closest(".stepper"),q=box.querySelector(".qty");let n=+q.textContent+(s.classList.contains("plus")?1:-1);q.textContent=Math.max(1,n);return;}
  const a=e.target.closest(".add");
  if(a){const id=a.dataset.id,box=a.closest(".card").querySelector(".stepper"),q=+box.querySelector(".qty").textContent;
    addToCart(id,q);box.querySelector(".qty").textContent="1";pulse();toast(t("added"));}
});
function addToCart(id,q){const ex=cart.find(c=>c.id===id);if(ex)ex.q+=q;else cart.push({id,q});updateFab();}

/* ============ CART ============ */
function toggleCart(){overlay.classList.toggle("on");if(overlay.classList.contains("on"))renderCart();}
function updateFab(){const n=cart.reduce((s,c)=>s+c.q,0),tot=cart.reduce((s,c)=>s+IDX[c.id].p*c.q,0);
  fabCount.textContent=n;fabTotal.textContent=eur(tot);}
function renderCart(){
  if(!cart.length){cartItems.innerHTML=`<div class="empty"><svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49a1 1 0 00-.87-1.48H5.21l-.94-2H1z"/></svg><div>${t("emptyCart")}</div></div>`;
    cartTotal.textContent="0,00€";ordMeta.textContent="";updateFab();return;}
  let tot=0;
  cartItems.innerHTML=cart.map(c=>{const it=IDX[c.id],line=it.p*c.q;tot+=line;
    return `<div class="citem"><div class="citem-top"><span class="citem-name">${it[LANG]}</span><span class="citem-line">${eur(line)}</span></div>
      <div class="citem-ctrl">
        <button class="rm" onclick="rmItem('${c.id}')"><svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>${LANG==="es"?"Quitar":"Remove"}</button>
        <div class="stepper"><button class="step" onclick="chg('${c.id}',-1)">−</button><span class="qty">${c.q}</span><button class="step" onclick="chg('${c.id}',1)">+</button></div>
      </div></div>`;}).join("");
  cartTotal.textContent=eur(tot);
  ordMeta.textContent=`${t("orderNo")}: ${orderNo} · ${new Date().toLocaleDateString(LANG==="es"?"es-ES":"en-GB")}`;
  updateFab();
}
function rmItem(id){cart=cart.filter(c=>c.id!==id);toast(t("removed"));renderCart();}
function chg(id,d){const c=cart.find(x=>x.id===id);if(!c)return;c.q+=d;if(c.q<=0)cart=cart.filter(x=>x.id!==id);renderCart();}

/* ============ WHATSAPP / COPY ============ */
function buildMsg(){
  let m=`*TAPAS Y MÁS · ALICANTE*\n${t("orderNo")}: ${orderNo}\n${new Date().toLocaleDateString(LANG==="es"?"es-ES":"en-GB")} ${new Date().toLocaleTimeString(LANG==="es"?"es-ES":"en-GB",{hour:"2-digit",minute:"2-digit"})}\n————————————\n`;
  let tot=0;
  ORDER.forEach(k=>{const inCat=cart.filter(c=>IDX[c.id].cat===k);if(!inCat.length)return;
    m+=`\n*${MENU[k].title[LANG]}*\n`;
    inCat.forEach(c=>{const it=IDX[c.id],line=it.p*c.q;tot+=line;m+=`• ${it[LANG]} x${c.q} — ${eur(line)}\n`;});});
  m+=`————————————\n*${t("total").toUpperCase()}: ${eur(tot)}*\n————————————\n\n`;
  m+=LANG==="es"?"📍 Mesa / Para llevar:\n📝 Notas:":"📍 Table / Takeaway:\n📝 Notes:";
  return m;
}
function sendWA(){if(!cart.length){toast(t("emptyMsg"));return;}
  window.open(`https://wa.me/${WA}?text=${encodeURIComponent(buildMsg())}`,"_blank");}
function copyOrder(){if(!cart.length){toast(t("emptyMsg"));return;}
  navigator.clipboard.writeText(buildMsg()).then(()=>toast(t("copied"))).catch(()=>toast("Error"));}

/* ============ HELPERS ============ */
function genOrder(){const d=new Date();return "TM-"+(""+d.getFullYear()).slice(-2)+String(d.getMonth()+1).padStart(2,"0")+String(d.getDate()).padStart(2,"0")+"-"+Math.random().toString(36).slice(2,6).toUpperCase();}
function pulse(){fab.classList.add("pulse");setTimeout(()=>fab.classList.remove("pulse"),420);}
let toastT;function toast(msg){const el=document.getElementById("toast");el.textContent=msg;el.classList.add("on");clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove("on"),2200);}

/* ============ SCROLL REVEAL ============ */
let io;
function observeCards(){
  if(window.matchMedia("(prefers-reduced-motion: reduce)").matches){document.querySelectorAll("[data-rev]").forEach(c=>c.classList.add("in"));return;}
  if(io)io.disconnect();
  io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add("in");io.unobserve(e.target);}}),{threshold:.12});
  document.querySelectorAll(".cat.on [data-rev]").forEach(c=>io.observe(c));
}

/* ============ INIT ============ */
render();
</script>
